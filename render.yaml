services:
  - type: web
    name: adeptus-backend
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter backend build
    startCommand: pnpm --filter backend start
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
    buildFilter:
      paths:
        - backend/**
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - render.yaml

  - type: web
    name: adeptus-phone
    runtime: static
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter phone build
    staticPublishPath: ./apps/phone/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    buildFilter:
      paths:
        - apps/phone/**
        - assets/**
        - packages/shared/**
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - render.yaml
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: adeptus-tablet
    runtime: static
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter tablet build
    staticPublishPath: ./apps/tablet/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_PHONE_URL
        sync: false
    buildFilter:
      paths:
        - apps/tablet/**
        - tablet_assets/**
        - packages/shared/**
        - package.json
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - render.yaml
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
